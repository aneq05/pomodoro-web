name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run unit tests
        run: npm run test

      - name: Build app
        run: npm run build